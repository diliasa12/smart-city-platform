apiVersion: v1
kind: ConfigMap
metadata:
  name: smartcity-config
  namespace: smartcity
data:
  DB_HOST: "mysql-service"
  DB_PORT: "3306"
  DB_DATABASE: "smartcity"
  DB_USERNAME: "root"
  OAUTH_URL: "http://oauth-server-service:3002"
  IOT_URL: "http://iot-service:3000"
  APP_NAME: "SmartCity"
  APP_ENV: "production"
  APP_DEBUG: "true"
  APP_URL: "http://smartcity.local"
  ASSET_URL: "http://smartcity.local"
  SESSION_DRIVER: "database"
  QUEUE_CONNECTION: "database"
  CACHE_STORE: "database"
  RABBITMQ_HOST: "rabbitmq-service"
  RABBITMQ_PORT: "5672"
  RABBITMQ_TELEMETRY_QUEUE: "telemetry_ml_queue"