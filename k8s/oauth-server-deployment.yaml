apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth-server
  namespace: smartcity
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth-server
  template:
    metadata:
      labels:
        app: oauth-server
    spec:
      containers:
        - name: oauth-server
          image: smartcity-oauth-server:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3002
          env:
            - name: NODE_ENV
              value: "development"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartcity-secrets
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: DB_DATABASE
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: smartcity-secrets
                  key: JWT_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: oauth-server-service
  namespace: smartcity
spec:
  selector:
    app: oauth-server
  ports:
    - port: 3002
      targetPort: 3002