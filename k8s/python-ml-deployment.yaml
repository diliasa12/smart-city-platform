apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-ml
  namespace: smartcity
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-ml
  template:
    metadata:
      labels:
        app: python-ml
    spec:
      containers:
        - name: python-ml
          image: diliasa/python-ml:v1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: RABBITMQ_PORT
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: python-ml-service
  namespace: smartcity
spec:
  selector:
    app: python-ml
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-ml-worker
  namespace: smartcity
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-ml-worker
  template:
    metadata:
      labels:
        app: python-ml-worker
    spec:
      containers:
        - name: python-ml-worker
          image: diliasa/python-ml:v1.0
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.worker"]
          env:
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: RABBITMQ_PORT
            - name: RABBITMQ_QUEUE
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: RABBITMQ_TELEMETRY_QUEUE
            - name: PHP_CALLBACK_URL
              value: "http://php-service-service:8000/api/telemetry/callback"

