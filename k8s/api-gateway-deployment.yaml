apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: smartcity
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: diliasa/api-gateway:v1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: smartcity-secrets
                  key: JWT_SECRET
            - name: OAUTH_URL
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: OAUTH_URL
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: smartcity
spec:
  selector:
    app: api-gateway
  ports:
    - port: 3000
      targetPort: 3000
