networks:
  smartcity-net:
    driver: bridge
    

volumes:
  mysql-data:
  rabbitmq-data:
  grafana-data:

services:
  # ── INFRA ──────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: smartcity-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=smartcity
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - smartcity-net
    healthcheck:
      # Ditambahkan user dan password root agar healthcheck mysqladmin berjalan valid
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: smartcity-rabbitmq
    ports:
      - "15672:15672"
      - "5672:5672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - smartcity-net

  oauth-server:
    build:
      context: ./oauth-server
      dockerfile: Dockerfile
    container_name: smart-city-oauth-server
    restart: always
    ports:
      - "5000:3002"
    environment:
      # PERBAIKAN: Spasi setelah tanda '=' di bawah ini telah dihapus total
      - NODE_ENV=development
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=rootpass
      - DB_NAME=smartcity
      - JWT_SECRET=kelompok3
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - smartcity-net

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: smartcity-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./iot/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./iot/passwd:/mosquitto/config/passwd
      - ./iot/data:/mosquitto/data
      - ./iot/log:/mosquitto/log
    networks:
      - smartcity-net

  # ── SERVICES ───────────────────────────────────────────────────────────────
  api-gateway:
    build: ./express-gateway
    container_name: smartcity-api-gateway
    ports:
      - "3000:3000"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - CITIZEN_URL=http://citizen-service:8000
      - TRAFFIC_URL=http://traffic-service:8001
      - ENV_URL=http://env-service:8002
      - ML_URL=http://python-ml:5000
    depends_on:
      rabbitmq:
        condition: service_started
      mysql:
        condition: service_healthy
    networks:
      - smartcity-net
  node-red:
    image: nodered/node-red:3.1
    container_name: smartcity-nodered
    restart: unless-stopped
    ports:
      - "1880:1880"
    volumes:
      - ./iot/node-red-data:/data
    environment:
      GATEWAY_URL: http://api-gateway:3000
      IOT_TOKEN: ${JWT_SECRET}
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
    depends_on:
      - mosquitto
      - api-gateway
    networks:
      - smartcity-net

  iot-simulator:
    build:
      context: ./iot
      dockerfile: Dockerfile
    container_name: smartcity-iot-simulator
    restart: unless-stopped
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MQTT_USERNAME: iot_device
      MQTT_PASSWORD: iot_secret
      MQTT_INTERVAL: 30
    depends_on:
      - mosquitto
    networks:
      - smartcity-net

  citizen-service:
    build:
      context: ./php-citizen
      dockerfile: Dockerfile
    container_name: smartcity-citizen
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - APP_KEY=${CITIZEN_APP_KEY}
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=smartcity
      - DB_USERNAME=root
      - DB_PASSWORD=rootpass
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - RABBITMQ_VHOST=/
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - smartcity-net

  # ── MONITORING ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: smartcity-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - smartcity-net

  grafana:
    image: grafana/grafana:10.2.0
    container_name: smartcity-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - smartcity-net