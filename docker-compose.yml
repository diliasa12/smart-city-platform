networks:
  smartcity-net:
    driver: bridge

volumes:
  mysql-data:
  rabbitmq-data:
  grafana-data:

services:
  # ── INFRA ──────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: smartcity-mysql
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=smartcity
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - smartcity-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    hostname: localhost
    restart: always
    ports:
      - 8081:80
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=mysql
    networks:
      - smartcity-net

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: smartcity-rabbitmq
    ports:
      - "15672:15672"
      - "5672:5672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - smartcity-net

  # ── OAUTH & GATEWAY ────────────────────────────────────────────────────────
  oauth-server:
    build:
      context: ./oauth-server
      dockerfile: Dockerfile
    container_name: smart-city-oauth-server
    restart: always
    ports:
      - "5001:3002"
    environment:
      - NODE_ENV=development
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=rootpass
      - DB_NAME=smartcity
      - JWT_SECRET=kelompok3
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - smartcity-net

  api-gateway:
    build: ./express-gateway
    container_name: smartcity-api-gateway
    ports:
      - "3000:3000"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - OAUTH_URL=http://oauth-server:3002
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - smartcity-net

  # ── CORE SERVICES (PHP & IOT) ──────────────────────────────────────────────
  php-service:
    build: ./php-service
    container_name: smartcity-service
    ports:
      - "8000:8000"
    volumes:
      - ./php-service:/var/www/html
      - /var/www/html/vendor
    environment:
      - APP_NAME=SmartCity
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - APP_KEY=${PHP_APP_KEY}
      - ASSET_URL=http://localhost:8000
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=smartcity
      - DB_USERNAME=root
      - DB_PASSWORD=rootpass
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - IOT_SERVICE_URL=http://iot-service:3000
      - SESSION_DRIVER=database
      - QUEUE_CONNECTION=database
      - CACHE_STORE=database
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - smartcity-net

  iot-service:
    build: ./iot
    container_name: smartcity-iot-service
    ports:
      - "3001:3000"
    networks:
      - smartcity-net

  # ── MACHINE LEARNING ───────────────────────────────────────────────────────
  python-ml:
    build:
      context: ./smart-city-ml-service
      dockerfile: Dockerfile
    container_name: smartcity-ml
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - ./smart-city-ml-service:/app
    networks:
      - smartcity-net

  python-ml-worker:
    build:
      context: ./smart-city-ml-service
      dockerfile: Dockerfile
    container_name: smartcity-python-worker
    command: python -m app.worker 
    environment:
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - rabbitmq
    volumes:
      - ./smart-city-ml-service:/app
    networks:
      - smartcity-net
    restart: always