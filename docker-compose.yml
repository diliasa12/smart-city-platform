networks:
  smartcity-net:
    driver: bridge
    

volumes:
  mysql-data:
  rabbitmq-data:
  grafana-data:

services:
  # ── INFRA ──────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: smartcity-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=smartcity
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - smartcity-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5
  phpmyadmin:
    image: phpmyadmin:latest
    hostname: localhost
    restart: always
    ports:
      - 8081:80
    environment:
      - PMA_ARBITRARY=1
    networks:
      - smartcity-net
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: smartcity-rabbitmq
    ports:
      - "15672:15672"
      - "5672:5672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - smartcity-net

  # FIX: oauth-server port luar diubah ke 5001 agar tidak bentrok dengan python-ml di 5000
  oauth-server:
    build:
      context: ./oauth-server
      dockerfile: Dockerfile
    container_name: smart-city-oauth-server
    restart: always
    ports:
      - "5001:3002"
    environment:
      - NODE_ENV=development
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=rootpass
      - DB_NAME=smartcity
      - JWT_SECRET=kelompok3
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - smartcity-net

 

  # ── SERVICES ───────────────────────────────────────────────────────────────
  api-gateway:
    build: ./express-gateway
    container_name: smartcity-api-gateway
    ports:
      - "3000:3000"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - OAUTH_URL=http://oauth-server:3002
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - smartcity-net

  php-service:
    build: ./php-service
    container_name: smartcity-service
    ports:
      - "8000:8000"
    volumes:
      - ./php-service:/var/www/html
      - /var/www/html/vendor
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=smartcity
      - DB_USERNAME=root
      - DB_PASSWORD=rootpass
      - APP_URL=http://php-service:8000
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - smartcity-net

  iot-service:
    build: ./iot
    container_name: smartcity-iot-service
    ports:
      - "3001:3000"
    networks:
      - smartcity-net