version: "3.9"

networks:
  smartcity-net:
    driver: bridge

volumes:
  mysql-data:
  rabbitmq-data:
  grafana-data:

services:
  # ── INFRA ──────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=smartcity
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - smartcity-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management
    ports:
      - "15672:15672"
      - "5672:5672" # Opsional: mengekspos port broker jika layanan luar butuh connect langsung
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - smartcity-net

  mosquitto:
    image: eclipse-mosquitto:2.0
    ports:
      - "1883:1883"
    volumes:
      - ./iot/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./iot/passwd:/mosquitto/config/passwd
      - ./iot/data:/mosquitto/data
      - ./iot/log:/mosquitto/log
    networks:
      - smartcity-net

  # ── SERVICES ───────────────────────────────────────────────────────────────
  api-gateway:
    build: ./express-gateway
    ports:
      - "3000:3000"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - ML_URL=http://python-ml:5000
      - OAUTH_URL=http://oauth-server:3002
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - smartcity-net


  citizen-service:
    build:
      context: ./php-citizen
      dockerfile: Dockerfile
    container_name: smartcity-citizen
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - APP_KEY=${CITIZEN_APP_KEY}
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=smartcity
      - DB_USERNAME=root
      - DB_PASSWORD=rootpass
      - RABBITMQ_HOST=smartcity-rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - RABBITMQ_VHOST=/
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - smartcity-net

  
  # python-ml:
  #   build:
  #     context: ./python-ml
  #     dockerfile: Dockerfile
  #   container_name: smartcity-python-ml
  #   restart: unless-stopped
  #   ports:
  #     - "5000:5000"
  #   networks:
  #     - smartcity-net

  # ── MONITORING ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - smartcity-net

  grafana:
    image: grafana/grafana:10.2.0
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - smartcity-net

  
