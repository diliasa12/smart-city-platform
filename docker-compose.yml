  # ── MONITORING ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: smartcity-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - smartcity-net

  grafana:
    image: grafana/grafana:10.2.0
    container_name: smartcity-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - smartcity-net

  traffic-service:
    build:
      context: ./php-traffic
      dockerfile: Dockerfile
    container_name: smartcity-traffic-service
    restart: always
    ports:
      - "8001:8001"
    env_file:
      - ./php-traffic/.env
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - smartcity-net
